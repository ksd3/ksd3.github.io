<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Blog Page</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: #fff;
            cursor: pointer;
        }

        article {
            display: none;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- Blog 1 -->
    <header id="blogTitle1">
        <h1 style="text-decoration: underline;">Blog Title 1</h1>
    </header>

    <article id="blogContent1">
        <p>Content for Blog 1 goes here.</p>
    </article>

    <script>
        document.getElementById('blogTitle1').addEventListener('click', function () {
            var blogContent = document.getElementById('blogContent1');
            blogContent.style.display = (blogContent.style.display === 'none' || blogContent.style.display === '') ? 'block' : 'none';
        });
    </script>

    <!-- Blog 2 -->
    <header id="blogTitle2">
        <h1 style="text-decoration: underline;">Blog Title 2</h1>
    </header>

    <article id="blogContent2">
        <p>Content for Blog 2 goes here.</p>
    </article>

    <script>
        document.getElementById('blogTitle2').addEventListener('click', function () {
            var blogContent = document.getElementById('blogContent2');
            blogContent.style.display = (blogContent.style.display === 'none' || blogContent.style.display === '') ? 'block' : 'none';
        });
    </script>

    <!-- Add more blogs as needed -->

</body>
</html>
