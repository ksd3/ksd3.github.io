A list of the courses I've taken, along with some thoughts or specialities
about them (click to reveal).

{% for topic in coursework %}
    <div class="topic">
    {% markdown %}
       #### {{topic}}
    {% endmarkdown %}
    {% for course in topic.courses %}
        <div class="title">
            <span class="titleName">{{course.name}}</span>
            <div class="hiddenItem">{{course.desc}}</div>
        </div>
    {% endfor %}
    </div>
{% endfor %}

<script>
    for (var elem of document.getElementsByClassName('topicName')) {
            elem.addEventListener('click', toggleDescription);
        }
</script>

<style>
    #coursework ul {
        margin-bottom: 8pt;
        margin-top: 4pt;
    }

    #coursework ul > li {
        margin-bottom: 2pt;
    }

    div.topic {
        margin-bottom: 8pt;
    }

    div.topic > div {
        margin-top: 4pt;
        margin-bottom: 12pt;
    }

    span.topicName {
        text-decoration: underline;
    }

    span.topicName:hover {
        cursor: pointer;
    }

    span.topicName:active {
        color: #000000;
    }

    div.semester {
        margin-bottom: 24pt;
    }
</style>
