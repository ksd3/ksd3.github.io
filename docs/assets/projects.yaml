labs:
    - name: Space Physics Lab
      start: October 2022
      end: Present
      location: Boston University
      projects:
        - title: A software toolkit to analyze STEVE
          desc: "My MS thesis topic. While groups across the world have put forward theories regarding STEVE, no one has taken a look at unified radar and satellite data. This is primarily because 1. we don't know when a STEVE is going to occur and 2. citizen science images are unstructured and the STEVEs in them need to be mapped to atmospheric images. Having a toolkit that can essentially grab a STEVE from an image, project it onto a world map, and display atmospheric data at the estimated time of the STEVE would be immensely helpful. In a broader sense, having a way to unify atmospheric data streams would be immensely helpful."
          link: Expected May 2024
    - name: Rafik B. Hariri Institute for Computing and Computational Science and Engineering
      start: July 2023
      end: Present
      location: Boston University
      projects:
          - title: Navigation and Infrastructure Thrust
            desc: "This is part of a research proposal for one of NASA's Mars Mission initiatives that is being worked on at BU. Specifically, I design software to conduct RF propagation experiments through the Martian ionosphere, focusing on the Mars Climate Model database."
            link: Expected June 2024
