labs:
    - name: Space Physics Lab
      start: October 2022
      end: Present
      location: Boston University
      projects:
        - title: A software toolkit to analyze STEVE
          desc: | My MS thesis topic. While groups across the world have put forward theories regarding STEVE, no one has taken a look at unified radar and satellite data.
          This is primarily because 1. we don't know when a STEVE is going to occur and 2. citizen science images are unstructured and the STEVEs in them need to be mapped to atmospheric images. Having a toolkit that can essentially grab a STEVE from an image, project it onto a world map, and display atmospheric data at the estimated time of the STEVE would be immensely helpful. In a broader sense, having a way to unify atmospheric data streams would be immensely helpful.
          link: Expected May 2024
    - name: Rafik B. Hariri Institute for Computing and Computational Science and Engineering
      start: July 2023
      end: Present
      location: Boston University
      projects:
          - title: Navigation and Infrastructure Thrust
            desc: "This is part of a research proposal for one of NASA's Mars Mission initiatives that is being worked on at BU. Specifically, I design software to conduct RF propagation experiments through the Martian ionosphere, focusing on the Mars Climate Model database."
            link: Expected June 2024
            
personalprojects:
    - title: Optimizing Solar Panel Tilt with Machine Learning
      desc: "Presented at the international GPECOM-21 conference. I was inspired to do this project when the EE department at COEP was installing new solar panels. What tilt angle would result in the greatest generated power? Based on time-series prediction (SARIMAX) and weather coefficients, we optimize the tilt angle for the parking lot installation at the NIST at Gaithersburg, and compare the output with theoretical results predicted by the SMARTS2 radiative transfer model."
      link: https://ieeexplore.ieee.org/document/9587892
    - title: Radio Telescope Design
      desc: "My senior year project. I designed and built a horn antenna to record signals from the galactic center, mentoring about 10 undergraduates along the way."
      link: https://github.com/ksd3/radio-telescope
    - title: Classifying galaxies with machine learning
      desc: "This is part of my work with Professor Gopal Bhatta at the University of Zielona Góra, Poland. We are attempting to improve upon state-of-the-art machine learning models for classifying galaxies. So far, we have implemented transformers with the self-attention mechanism on the Galaxy10 dataset and achieved an 89% classification accuracy."
      link: https://github.com/ksd3/galaxy10-classification
    - title: BeatQraft
      desc: "A beat generator, powered by state-of-the-art quantum computing. This project won second place at MIT's iQuHACK-23 quantum computing hackathon. Using quantum circuit Born machines, we designed and implemented a music generator trained on 96 different beats and used it to generate new beats. At scale, QCBMs can provably outperform classical machine learning algorithms, and this is a perfect use case for the Covalent quantum computing framework. Implemented using Qiskit, Covalent, and the IBM Oslo quantum computer."
      link: https://github.com/ksd3/BeatQraft
    - title: Binary star analysis
      desc: "The binary star system QX Cas is interesting because it has stopped eclipsing and started up again, one of only two known so far to do so. Why does this happen? A project I've worked on on-and-off over the past three years with other collaborators. The leading theory is that there is a large dim object of about a million solar masses directly behind the star system that is causing this phenomenon, a stunning example of a Kozai cycle."
      
